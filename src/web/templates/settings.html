{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
<div class="row">
  <div class="col-md-6">
    <div class="card mb-3">
      <div class="card-header">Panel Credentials</div>
      <div class="card-body">
        <p class="text-muted">Stored encrypted. The admin cannot see these.</p>
        <form method="post" action="/settings">
          <div class="mb-3">
            <label class="form-label">Panel Username</label>
            <input class="form-control" name="panel_username" placeholder="Leave blank to keep current"/>
          </div>
          <div class="mb-3">
            <label class="form-label">Panel Password</label>
            <input class="form-control" type="password" name="panel_password" placeholder="Leave blank to keep current"/>
          </div>
          <button class="btn btn-primary" type="submit">Save Panel Credentials</button>
        </form>
      </div>
    </div>
  </div>
  <div class="col-md-6">
    <div class="card">
      <div class="card-header">Change Dashboard Password</div>
      <div class="card-body">
        <form method="post" action="/settings">
          <div class="mb-3">
            <label class="form-label">Current Password</label>
            <input class="form-control" type="password" name="old_password"/>
          </div>
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input class="form-control" type="password" name="new_password"/>
          </div>
          <button class="btn btn-primary" type="submit">Change Password</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
