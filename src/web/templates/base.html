<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}SMS Panel{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">SMS Panel</a>
    <div class="d-flex align-items-center">
      {% if user %}
        {% if user.is_admin %}<a class="btn btn-outline-light btn-sm me-2" href="/admin">Admin</a>{% endif %}
        <span class="navbar-text me-3 text-light">{{ user.username }}</span>
        <a class="btn btn-outline-light btn-sm" href="/logout">Logout</a>
      {% else %}
        <a class="btn btn-outline-light btn-sm" href="/login">Login</a>
      {% endif %}
    </div>
  </div>
</nav>
<div class="container mt-4">
  {% block content %}{% endblock %}
</div>
</body>
</html>
