services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: panelbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  bot:
    build: .
    env_file: .env
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres+asyncpg://app:app@db:5432/panelbot

volumes:
  pgdata:
